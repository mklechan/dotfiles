# Window
remember_window_size       no
initial_window_width       100c
initial_window_height      30c
background_opacity         0.90
dynamic_background_opacity yes
window_padding_width       4
placement_strategy         center
hide_window_decorations    no
confirm_os_window_close    0

# Scrolling
scrollback_lines           10000
wheel_scroll_multiplier    3.0

# Font
font_family                family="JetBrainsMono Nerd Font Mono"
bold_font                  auto
italic_font                auto
bold_italic_font           auto
font_size                  12.0
disable_ligatures          never

# Cursor
cursor_shape               underline
cursor_shape_unfocused     hollow
cursor_underline_thickness 1.5
cursor_blink_interval      0

# Mouse
mouse_hide_wait            3.0
copy_on_select             clipboard
strip_trailing_spaces      smart
select_by_word_characters  @-./_~?&=%+#

# Bell
enable_audio_bell          no

# Colors — Nord (matches Alacritty)
foreground                 #D8DEE9
background                 #2E3440
selection_foreground       #2E3440
selection_background       #D8DEE9

# normal
color0                     #3B4252
color1                     #BF616A
color2                     #A3BE8C
color3                     #EBCB8B
color4                     #81A1C1
color5                     #B48EAD
color6                     #88C0D0
color7                     #E5E9F0

# bright
color8                     #4C566A
color9                     #BF616A
color10                    #A3BE8C
color11                    #EBCB8B
color12                    #81A1C1
color13                    #B48EAD
color14                    #8FBCBB
color15                    #ECEFF4

cursor                     #D8DEE9
cursor_text_color          background

# Keybindings
clear_all_shortcuts        no

# Clipboard
map ctrl+shift+v           paste_from_clipboard
map ctrl+shift+c           copy_to_clipboard
map shift+insert           paste_from_selection

# Scrolling
map shift+page_up          scroll_page_up
map shift+page_down        scroll_page_down
map shift+home             scroll_home
map shift+end              scroll_end

# Search (scrollback browser, closest equivalent to Alacritty SearchForward/Backward)
map ctrl+shift+f           show_scrollback
map ctrl+shift+b           launch --type=overlay --stdin-source=@screen_scrollback less +G -R

# Font size
map ctrl+0                 change_font_size all 0
map ctrl+plus              change_font_size all +1.0
map ctrl+equal             change_font_size all +1.0
map ctrl+minus             change_font_size all -1.0

# Clear screen on Ctrl+L (matches Alacritty's chars = "\f")
map ctrl+l                 send_text all \x0c

# Shift+Enter sends ESC + CR (matches Alacritty chars = "\r")
map shift+enter            send_text all \x1b\r
